<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Hybrid Chat</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #2c3e50; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 300px; text-align: center; }
        .login-box h2 { margin-top: 0; color: #2c3e50; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box;}
        button { width: 90%; padding: 12px; background: #1abc9c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px;}
        button:hover { background: #16a085; }
        #error-msg { color: #e74c3c; font-size: 14px; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Vào phòng Chat</h2>
        <input type="text" id="username" placeholder="Tên đăng nhập...">
        <input type="password" id="password" placeholder="Mật khẩu...">
        <button onclick="performLogin()">Đăng nhập</button>
        <div id="error-msg"></div>
    </div>

    <script>
        async function performLogin() {
            const usernameInput = document.getElementById("username").value.trim();
            const passwordInput = document.getElementById("password").value.trim();
            const errorMsg = document.getElementById("error-msg");

            if (!usernameInput || !passwordInput) {
                errorMsg.innerText = "Vui lòng nhập đầy đủ tên và mật khẩu!";
                return;
            }

            try {
                const response = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const result = await response.json();

                // Kiểm tra status từ server trả về
                if (response.ok && result.status === "success") {
                    localStorage.setItem("chat_username", usernameInput);
                    window.location.href = "/chat.html";
                } else {
                    errorMsg.innerText = result.message || "Xác thực thất bại!";
                }
            } catch (error) {
                errorMsg.innerText = "Không thể kết nối đến máy chủ!";
            }
        }
    </script>
</body>
</html>
