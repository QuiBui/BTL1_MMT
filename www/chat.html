<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hybrid Chat (Client-Server & P2P)</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; margin: 0; height: 100vh; background: #f0f2f5;}
        .sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px; }
        .channel-list { list-style: none; padding: 0; }
        .channel-item { 
            display: flex; 
            align-items: center; 
            padding: 10px; 
            cursor: pointer; 
            border-bottom: 1px solid #34495e; 
        }
        .channel-item:hover, .channel-item.active { background: #1abc9c; }
        
        /* Chấm đỏ thông báo */
        .notification-dot {
            display: none; /* Mặc định ẩn */
            width: 10px;
            height: 10px;
            background-color: #e74c3c;
            border-radius: 50%;
            margin-left: auto; /* Đẩy sang góc phải */
        }

        .chat-area { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; }
        .messages { flex-grow: 1; background: white; border-radius: 8px; padding: 15px; overflow-y: scroll; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
        .msg-box { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #e9ecef; }
        .msg-box.me { background: #dcf8c6; text-align: right; }
        .input-area { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Quản lý Kênh</h3>
        <ul class="channel-list" id="channels">
            <li class="channel-item active" id="btn-general" onclick="switchChannel('general', this)">
                # general <span class="notification-dot"></span>
            </li>
            <li class="channel-item" id="btn-hcmut" onclick="switchChannel('hcmut', this)">
                # hcmut <span class="notification-dot"></span>
            </li>
        </ul>
        <hr>
        <input type="text" id="username" placeholder="Tên..." value="User1" style="width: 90%; margin-top: 20px;" readonly>
    </div>

    <div class="chat-area">
        <h2 id="current-channel-title">Kênh: #general</h2>
        <div class="messages" id="message-container"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Nhập tin nhắn (Không thể sửa/xóa)...">
            <button onclick="sendBroadcast()">Gửi (Broadcast)</button>
        </div>
    </div>

    <script>
        const savedName = localStorage.getItem("chat_username");
        if (savedName) document.getElementById('username').value = savedName;

        let currentChannel = 'general';
        let lastMessageCount = 0;
        let knownMessageCounts = { 'general': 0, 'hcmut': 0 };

        function switchChannel(channelName, element) {
            currentChannel = channelName;
            document.getElementById('current-channel-title').innerText = `Kênh: #${channelName}`;
            
            // Tắt dấu chấm thông báo khi click vào kênh
            if(element) {
                const dot = element.querySelector('.notification-dot');
                if(dot) dot.style.display = "none";
            }
            
            // Cập nhật giao diện đang chọn
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
            
            // Xoá trắng giao diện chat ngay lập tức khi đổi kênh
            document.getElementById("message-container").innerHTML = "";
            lastMessageCount = -1; 
            
            fetchMessages();
        }

        async function sendBroadcast() {
            const user = document.getElementById('username').value || "Ẩn danh";
            const text = document.getElementById('msg-input').value;
            if (!text.trim()) return;

            const payload = { sender: user, text: text, channel: currentChannel };
            try {
                await fetch("/broadcast-peer", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                document.getElementById('msg-input').value = "";
                fetchMessages(); // Cập nhật lại list tin sau khi gửi
            } catch (error) {
                console.error("Lỗi khi gửi:", error);
            }
        }

        document.getElementById("msg-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendBroadcast();
            }
        });

        // Hàm tải tin nhắn cho kênh đang mở
        async function fetchMessages() {
            try {
                const response = await fetch("/get-messages", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ channel: currentChannel })
                });
                const data = await response.json();
                const container = document.getElementById("message-container");
                const username = document.getElementById('username').value;
                
                if (data.messages.length === lastMessageCount) return; 

                // Hiệu ứng nhấp nháy title khi có tin mới ở kênh đang mở
                if (lastMessageCount > 0) { 
                    document.title = "(Có tin nhắn mới!) Hybrid Chat";
                    setTimeout(() => { document.title = "Hybrid Chat (Client-Server & P2P)"; }, 3000);
                }

                container.innerHTML = "";
                data.messages.forEach(msg => {
                    const isMe = msg.sender === username ? "me" : "";
                    container.innerHTML += `<div class="msg-box ${isMe}"><b>${msg.sender}</b>: ${msg.text}</div>`;
                });

                lastMessageCount = data.messages.length;
                knownMessageCounts[currentChannel] = lastMessageCount; // Đồng bộ số đếm tin
                container.scrollTop = container.scrollHeight; 
            } catch (error) {
                console.error("Lỗi đồng bộ:", error);
            }
        }

        // Hàm kiểm tra ngầm các kênh không được mở để bật dấu chấm
        async function checkNotifications() {
            const channelList = ['general', 'hcmut'];
            
            for (let ch of channelList) {
                // Bỏ qua kênh đang chat vì nó đã được cập nhật bởi fetchMessages
                if (ch === currentChannel) {
                    knownMessageCounts[ch] = lastMessageCount > 0 ? lastMessageCount : knownMessageCounts[ch];
                    continue; 
                }

                try {
                    const response = await fetch("/get-messages", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ channel: ch })
                    });
                    const data = await response.json();
                    const totalMessages = data.messages.length;

                    const dotEl = document.querySelector(`#btn-${ch} .notification-dot`);
                    
                    // Nếu số lượng tin lớn hơn mốc đã biết, hiện chấm đỏ
                    if (totalMessages > knownMessageCounts[ch]) {
                        if(dotEl) dotEl.style.display = "inline-block";
                    }
                    
                    knownMessageCounts[ch] = totalMessages;
                } catch (error) {
                    console.error("Lỗi check thông báo kênh", ch, error);
                }
            }
        }

        setInterval(fetchMessages, 2000); // Tải tin nhắn kênh hiện tại mỗi 2s
        setInterval(checkNotifications, 3000); // Kiểm tra chấm đỏ các kênh khác mỗi 3s
        
        async function registerPeer() {
            try {
                // Backend tự tạo Socket TCP báo danh lên Tracker
                await fetch("/local-register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({})
                });
                console.log("Đã yêu cầu Backend đăng ký với Tracker thành công!");
            } catch (error) {
                console.error("Lỗi đăng ký peer:", error);
            }
        }

        // Khởi động
        registerPeer();
    </script>
</body>
</html>
